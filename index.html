<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
        }
        h1 {
            margin: 0;
        }
        .content {
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: darkblue;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website 🚀</h1>
    </header>

    <div class="content">
        <h2>Hello, I'm Vinayak 👋</h2>
        <p>This is my first website hosted on GitHub Pages.</p>

        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("Your website is working! 🎉");
        }
    </script>

</body>
</html>
